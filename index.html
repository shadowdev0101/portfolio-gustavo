<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador Inteligente de Dados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-icon">🔍</div>
            <h1>Validador Inteligente</h1>
            <p>Valide seus dados com correções automáticas</p>
        </header>

        <!-- Formulário -->
        <div class="form-card">
            <form id="validatorForm">
                <!-- Campo Nome -->
                <div class="form-group" id="nome-group">
                    <label>
                        <span class="icon">👤</span>
                        Nome Completo
                    </label>
                    <div class="input-wrapper">
                        <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo">
                        <span class="input-icon">📝</span>
                    </div>
                    <div class="feedback" id="nome-feedback"></div>
                </div>

                <!-- Campo Email -->
                <div class="form-group" id="email-group">
                    <label>
                        <span class="icon">📧</span>
                        Email
                    </label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="seu.email@exemplo.com">
                        <span class="input-icon">✉️</span>
                    </div>
                    <div class="feedback" id="email-feedback"></div>
                </div>

                <!-- Campo Senha -->
                <div class="form-group" id="senha-group">
                    <label>
                        <span class="icon">🔐</span>
                        Senha
                    </label>
                    <div class="input-wrapper">
                        <input type="password" id="senha" name="senha" placeholder="Crie uma senha forte">
                        <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar-container">
                            <div class="strength-bar" id="strength-bar"></div>
                        </div>
                        <div class="strength-text" id="strength-text"></div>
                        <div class="password-requirements" id="password-requirements">
                            <div class="requirement" data-req="length">
                                <span class="check">✗</span>
                                <span>Mínimo 8 caracteres</span>
                            </div>
                            <div class="requirement" data-req="upper">
                                <span class="check">✗</span>
                                <span>Letra maiúscula</span>
                            </div>
                            <div class="requirement" data-req="number">
                                <span class="check">✗</span>
                                <span>Número</span>
                            </div>
                            <div class="requirement" data-req="special">
                                <span class="check">✗</span>
                                <span>Caractere especial</span>
                            </div>
                        </div>
                    </div>
                    <div class="feedback" id="senha-feedback"></div>
                </div>

                <!-- Campo CPF -->
                <div class="form-group" id="cpf-group">
                    <label>
                        <span class="icon">🪪</span>
                        CPF
                    </label>
                    <div class="input-wrapper">
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14">
                        <span class="input-icon">📄</span>
                    </div>
                    <div class="feedback" id="cpf-feedback"></div>
                </div>

                <!-- Botão -->
                <button type="submit" class="btn-validate" id="btn-validate">
                    <span class="btn-content">
                        <span class="btn-icon">✨</span>
                        Validar Dados
                    </span>
                    <span class="spinner"></span>
                </button>
            </form>
        </div>

        <!-- Resultados -->
        <section class="results" id="results">
            <div class="results-header">
                <div class="icon">📊</div>
                <div>
                    <h2>Resultados da Validação</h2>
                    <p class="subtitle">Verifique o status de cada campo</p>
                </div>
            </div>
            <div id="results-content"></div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>Desenvolvido com 💙 | Validador Inteligente de Dados</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
